name: Locust Performance Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * *"   # Nightly at 03:00 UTC
  workflow_dispatch:
    inputs:
      users:
        description: "Number of concurrent users"
        required: false
        default: "50"
      spawn_rate:
        description: "Users spawned per second"
        required: false
        default: "5"
      run_time:
        description: "Test duration (e.g. 2m, 5m)"
        required: false
        default: "2m"

jobs:

  # ── Smoke Load Test (fast, every push) ────────────────────────────────────
  smoke-load:
    name: Smoke Load Test (20 users, 1m)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke load test
        run: |
          locust -f locustfiles/booking_load.py \
            --headless \
            --users 20 \
            --spawn-rate 5 \
            --run-time 1m \
            --host ${{ secrets.BASE_URL || 'https://restful-booker.herokuapp.com' }} \
            --html reports/smoke-load-report.html \
            --csv reports/smoke-load
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password123' }}

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-load-report
          path: reports/
          retention-days: 7

  # ── Full Load Test (on push to main / nightly) ─────────────────────────────
  full-load:
    name: Full Load Test
    runs-on: ubuntu-latest
    needs: smoke-load
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full load test
        run: |
          locust -f locustfiles/booking_load.py \
            --headless \
            --users ${{ github.event.inputs.users || '100' }} \
            --spawn-rate ${{ github.event.inputs.spawn_rate || '10' }} \
            --run-time ${{ github.event.inputs.run_time || '3m' }} \
            --host ${{ secrets.BASE_URL || 'https://restful-booker.herokuapp.com' }} \
            --html reports/full-load-report.html \
            --csv reports/full-load
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password123' }}

      - name: Upload full load report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-load-report
          path: reports/
          retention-days: 14

  # ── Spike Test (nightly only) ──────────────────────────────────────────────
  spike-test:
    name: Spike Test
    runs-on: ubuntu-latest
    needs: smoke-load
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spike test
        run: |
          locust -f locustfiles/spike_stress.py SpikeUser \
            --headless \
            --users 150 \
            --spawn-rate 150 \
            --run-time 2m \
            --host ${{ secrets.BASE_URL || 'https://restful-booker.herokuapp.com' }} \
            --html reports/spike-report.html \
            --csv reports/spike
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password123' }}

      - name: Upload spike report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spike-report
          path: reports/
          retention-days: 14
